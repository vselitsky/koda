# Traefik override — join the external Traefik network and enable routing.
#
# Usage:
#   docker compose -f compose.yaml -f compose.traefik.yml \
#     --env-file profiles/.env-<model>.<quant> up -d
#
# Required: the external Traefik network must already exist.
#   docker network create traefik

name: koda

services:
  koda:
    networks:
      - default
      - traefik
    labels:
      traefik.enable: "true"
      traefik.docker.network: ${TRAEFIK_NETWORK:-traefik}
      traefik.http.routers.koda.rule: Host(`${TRAEFIK_HOST:-koda.localhost}`)
      traefik.http.routers.koda.entrypoints: ${TRAEFIK_ENTRYPOINTS:-websecure}
      traefik.http.routers.koda.tls: ${TRAEFIK_TLS:-true}
      traefik.http.services.koda.loadbalancer.server.port: "8080"

networks:
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik}
