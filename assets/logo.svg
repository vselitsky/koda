<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 150" width="560" height="150">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1724"/>
      <stop offset="100%" stop-color="#080d14"/>
    </linearGradient>
    <linearGradient id="accent" gradientUnits="userSpaceOnUse" x1="20" y1="15" x2="135" y2="135">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="lineGrad" gradientUnits="userSpaceOnUse" x1="20" y1="15" x2="135" y2="135">
      <stop offset="0%" stop-color="#5b21b6"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="560" height="150" rx="14" fill="url(#bg)"/>
  <rect width="560" height="150" rx="14" fill="none" stroke="#1e2d40" stroke-width="1"/>

  <!-- ── LOGO MARK  center=(78,75)  inner r=25  outer r=48 ── -->

  <!-- Slowly rotating dashed outer ring -->
  <circle cx="78" cy="75" r="57" fill="none" stroke="#162033" stroke-width="0.75" stroke-dasharray="3 10">
    <animateTransform attributeName="transform" type="rotate"
                      from="0 78 75" to="360 78 75"
                      dur="28s" repeatCount="indefinite"/>
  </circle>

  <!-- Outer ring → inner ring connections (muted) -->
  <!-- o1(78,27) → i1(91,53)  i6(65,53) -->
  <line x1="78"  y1="27"  x2="91"  y2="53"  stroke="url(#lineGrad)" stroke-width="1" opacity="0.35"/>
  <line x1="78"  y1="27"  x2="65"  y2="53"  stroke="url(#lineGrad)" stroke-width="1" opacity="0.35"/>
  <!-- o2(120,51) → i1(91,53)  i2(103,75) -->
  <line x1="120" y1="51"  x2="91"  y2="53"  stroke="url(#lineGrad)" stroke-width="1" opacity="0.35"/>
  <line x1="120" y1="51"  x2="103" y2="75"  stroke="url(#lineGrad)" stroke-width="1" opacity="0.35"/>
  <!-- o3(120,99) → i2(103,75)  i3(91,97) -->
  <line x1="120" y1="99"  x2="103" y2="75"  stroke="url(#lineGrad)" stroke-width="1" opacity="0.35"/>
  <line x1="120" y1="99"  x2="91"  y2="97"  stroke="url(#lineGrad)" stroke-width="1" opacity="0.35"/>
  <!-- o4(78,123) → i3(91,97)  i4(65,97) -->
  <line x1="78"  y1="123" x2="91"  y2="97"  stroke="url(#lineGrad)" stroke-width="1" opacity="0.35"/>
  <line x1="78"  y1="123" x2="65"  y2="97"  stroke="url(#lineGrad)" stroke-width="1" opacity="0.35"/>
  <!-- o5(36,99) → i4(65,97)  i5(53,75) -->
  <line x1="36"  y1="99"  x2="65"  y2="97"  stroke="url(#lineGrad)" stroke-width="1" opacity="0.35"/>
  <line x1="36"  y1="99"  x2="53"  y2="75"  stroke="url(#lineGrad)" stroke-width="1" opacity="0.35"/>
  <!-- o6(36,51) → i5(53,75)  i6(65,53) -->
  <line x1="36"  y1="51"  x2="53"  y2="75"  stroke="url(#lineGrad)" stroke-width="1" opacity="0.35"/>
  <line x1="36"  y1="51"  x2="65"  y2="53"  stroke="url(#lineGrad)" stroke-width="1" opacity="0.35"/>

  <!-- Outer ring nodes -->
  <circle cx="78"  cy="27"  r="3.5" fill="url(#accent)" filter="url(#glow)"/>
  <circle cx="120" cy="51"  r="3.5" fill="url(#accent)" filter="url(#glow)"/>
  <circle cx="120" cy="99"  r="3.5" fill="url(#accent)" filter="url(#glow)"/>
  <circle cx="78"  cy="123" r="3.5" fill="url(#accent)" filter="url(#glow)"/>
  <circle cx="36"  cy="99"  r="3.5" fill="url(#accent)" filter="url(#glow)"/>
  <circle cx="36"  cy="51"  r="3.5" fill="url(#accent)" filter="url(#glow)"/>

  <!-- Inner ring → center connections (pulsing) -->
  <g>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
    <line x1="78" y1="75" x2="91"  y2="53" stroke="url(#accent)" stroke-width="1.5"/>
    <line x1="78" y1="75" x2="103" y2="75" stroke="url(#accent)" stroke-width="1.5"/>
    <line x1="78" y1="75" x2="91"  y2="97" stroke="url(#accent)" stroke-width="1.5"/>
    <line x1="78" y1="75" x2="65"  y2="97" stroke="url(#accent)" stroke-width="1.5"/>
    <line x1="78" y1="75" x2="53"  y2="75" stroke="url(#accent)" stroke-width="1.5"/>
    <line x1="78" y1="75" x2="65"  y2="53" stroke="url(#accent)" stroke-width="1.5"/>
  </g>

  <!-- Inner ring nodes -->
  <circle cx="91"  cy="53" r="5" fill="url(#accent)" filter="url(#glow)"/>
  <circle cx="103" cy="75" r="5" fill="url(#accent)" filter="url(#glow)"/>
  <circle cx="91"  cy="97" r="5" fill="url(#accent)" filter="url(#glow)"/>
  <circle cx="65"  cy="97" r="5" fill="url(#accent)" filter="url(#glow)"/>
  <circle cx="53"  cy="75" r="5" fill="url(#accent)" filter="url(#glow)"/>
  <circle cx="65"  cy="53" r="5" fill="url(#accent)" filter="url(#glow)"/>

  <!-- Center pulse ring -->
  <circle cx="78" cy="75" r="10" fill="none" stroke="#7c3aed" stroke-width="1.5">
    <animate attributeName="r"       values="10;27;10" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.55;0;0.55" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Center node -->
  <circle cx="78" cy="75" r="9" fill="url(#accent)" filter="url(#strongGlow)"/>
  <circle cx="78" cy="75" r="9" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <!-- ── TEXT ── -->

  <!-- Vertical divider -->
  <line x1="145" y1="22" x2="145" y2="128" stroke="#1e293b" stroke-width="0.75"/>

  <!-- KODA wordmark -->
  <text x="163" y="87"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="52" font-weight="800"
        fill="#f1f5f9" letter-spacing="8">KODA</text>

  <!-- Thin rule under wordmark -->
  <line x1="163" y1="98" x2="530" y2="98" stroke="#1e293b" stroke-width="0.75"/>

  <!-- Subtitle -->
  <text x="165" y="116"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="11" font-weight="500"
        fill="#475569" letter-spacing="3.5">LOCAL LLM ORCHESTRATOR</text>
</svg>
