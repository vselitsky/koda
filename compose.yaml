name: koda

services:
  koda:
    container_name: ${CONTAINER_NAME:-koda}
    # For NVIDIA or CPU-only:
    image: ${LLAMA_CPP_IMAGE:-ghcr.io/ggml-org/llama.cpp:server}
    # For AMD (ROCm):
    # image: ${LLAMA_CPP_IMAGE:-ghcr.io/ggml-org/llama.cpp:server-rocm}
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/entrypoints/compose-entrypoint.sh"]
    environment:
      - API_KEY=${API_KEY:-}
      - MODEL_FILE=${MODEL_FILE:-}
      - CTX=${CTX:-0}
      - UBATCH=${UBATCH:-512}
      - BATCH=${BATCH:-512}
      - GPU_LAYERS=${GPU_LAYERS:--1}
      - PROMPT_FORMAT=${PROMPT_FORMAT:-jinja}
      - CHAT_TPL=${CHAT_TPL:-chatml}
      - RPC=${RPC:-}
      - METRICS=${METRICS:-0}
      - ALIAS=${ALIAS:-}
      - SERVER_EXTRA_ARGS=${SERVER_EXTRA_ARGS:-}
    env_file:
      - .env
    volumes:
      - ${MODEL_DIR:?set MODEL_DIR in .env or your shell}:/models:ro
      - ~/.cache/huggingface:/root/.cache/huggingface:ro
      - ./scripts/compose-entrypoint.sh:/entrypoints/compose-entrypoint.sh:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    ports:
      - "${PORT:-8080}:8080"
    labels:
      traefik.enable: ${TRAEFIK_ENABLE:-false}
      traefik.docker.network: ${TRAEFIK_NETWORK:-traefik}
      traefik.http.routers.koda.rule: Host(`${TRAEFIK_HOST:-koda.localhost}`)
      traefik.http.routers.koda.entrypoints: ${TRAEFIK_ENTRYPOINTS:-websecure}
      traefik.http.routers.koda.tls: ${TRAEFIK_TLS:-true}
      traefik.http.services.koda.loadbalancer.server.port: "8080"
